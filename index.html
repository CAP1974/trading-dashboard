<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carlos · Trading Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="data.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080c10;
      --s1:        #0d1117;
      --s2:        #111820;
      --s3:        #161d28;
      --border:    #1c2636;
      --border2:   #263044;
      --text:      #c9d1d9;
      --muted:     #6e7f96;
      --dim:       #3d4f63;
      --green:     #3fb950;
      --green2:    rgba(63,185,80,0.14);
      --red:       #f85149;
      --red2:      rgba(248,81,73,0.14);
      --blue:      #58a6ff;
      --blue2:     rgba(88,166,255,0.12);
      --yellow:    #e3b341;
      --yellow2:   rgba(227,179,65,0.14);
      --font:      'IBM Plex Mono', monospace;
    }

    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── TOPBAR ─────────────────────────────────────────────────────── */
    #topbar {
      position: sticky; top: 0; z-index: 300;
      background: var(--s1);
      border-bottom: 1px solid var(--border);
      height: 46px;
      display: flex; align-items: center;
      justify-content: space-between;
      padding: 0 20px;
    }
    .tb-left  { display: flex; align-items: center; gap: 10px; }
    .tb-badge {
      font-size: 10px; font-weight: 700; letter-spacing: 1px;
      background: #1f6feb; color: #fff;
      padding: 2px 9px; border-radius: 10px;
    }
    .tb-name  { font-size: 14px; font-weight: 600; }
    .tb-pair  { font-size: 11px; color: var(--muted); }
    #utc-clock { font-size: 12px; color: var(--muted); letter-spacing: 0.5px; }
    #utc-clock b { color: var(--text); font-weight: 500; }

    /* ── DATE TABS ──────────────────────────────────────────────────── */
    #date-tabs {
      background: var(--s1);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 16px; gap: 2px;
      overflow-x: auto; scrollbar-width: none;
    }
    #date-tabs::-webkit-scrollbar { display: none; }
    .dtab {
      padding: 9px 16px;
      font-family: var(--font); font-size: 11px; font-weight: 500;
      color: var(--muted); background: transparent; border: none;
      border-bottom: 2px solid transparent;
      cursor: pointer; white-space: nowrap;
      transition: color .15s, border-color .15s;
    }
    .dtab:hover { color: var(--text); }
    .dtab.active { color: var(--blue); border-bottom-color: var(--blue); }

    /* ── LAYOUT ─────────────────────────────────────────────────────── */
    main { max-width: 1480px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; gap: 18px; }

    .sec-label {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1px; color: var(--dim); margin-bottom: 10px;
    }

    /* ── KPI GRID ───────────────────────────────────────────────────── */
    #kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    @media (max-width: 960px)  { #kpi-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 480px)  { #kpi-grid { grid-template-columns: 1fr; } }

    .kpi {
      background: var(--s1); border: 1px solid var(--border);
      border-radius: 7px; padding: 14px 16px;
    }
    .kpi-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 5px; }
    .kpi-val   { font-size: 21px; font-weight: 700; line-height: 1.2; }
    .kpi-sub   { font-size: 10px; color: var(--dim); margin-top: 3px; }
    .pos  { color: var(--green); }
    .neg  { color: var(--red); }
    .neu  { color: var(--blue); }
    .warn { color: var(--yellow); }

    /* ── PANELS ─────────────────────────────────────────────────────── */
    #panels { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 700px) { #panels { grid-template-columns: 1fr; } }

    .panel {
      background: var(--s1); border: 1px solid var(--border);
      border-radius: 7px; padding: 16px;
    }
    .panel-head {
      display: flex; align-items: baseline;
      justify-content: space-between; margin-bottom: 12px;
    }
    .panel-title  { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); }
    .panel-lucro  { font-size: 18px; font-weight: 700; }
    .panel-meta   { display: flex; flex-wrap: wrap; gap: 14px; margin-bottom: 12px; }
    .pmeta        { font-size: 11px; color: var(--muted); }
    .pmeta span   { color: var(--text); }
    .pmeta.badge  {
      font-size: 10px; font-weight: 600; padding: 2px 8px;
      border-radius: 4px; letter-spacing: 0.5px;
    }
    .pmeta.aporte  { background: var(--yellow2); color: var(--yellow); }
    .pmeta.caixa   { background: var(--blue2);   color: var(--blue); }
    .spark-wrap    { position: relative; height: 72px; }

    /* ── EVENTOS ─────────────────────────────────────────────────────── */
    #eventos-panel {
      background: var(--s1); border: 1px solid var(--border);
      border-radius: 7px; padding: 16px;
    }
    .ev-list  { display: flex; flex-direction: column; gap: 5px; }
    .ev-row   {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 10px; border-radius: 5px;
      background: var(--s2); font-size: 12px;
    }
    .ev-icon  { font-size: 14px; flex-shrink: 0; }
    .ev-nota  { color: var(--text); line-height: 1.4; }
    .ev-mkt   { font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 3px; flex-shrink: 0; }
    .ev-mkt.eur { background: var(--blue2);  color: var(--blue); }
    .ev-mkt.usd { background: var(--green2); color: var(--green); }
    .no-ev    { color: var(--dim); font-size: 12px; padding: 6px 0; }

    /* ── TABLE ───────────────────────────────────────────────────────── */
    #table-wrap {
      background: var(--s1); border: 1px solid var(--border);
      border-radius: 7px; overflow: hidden;
    }
    .tbl-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 16px; border-bottom: 1px solid var(--border);
    }
    .ftabs { display: flex; gap: 4px; }
    .ftab  {
      font-family: var(--font); font-size: 11px; font-weight: 500;
      padding: 4px 12px; border-radius: 4px;
      border: 1px solid var(--border2);
      background: transparent; color: var(--muted); cursor: pointer;
      transition: all .15s;
    }
    .ftab:hover  { color: var(--text); border-color: var(--border2); }
    .ftab.active { background: var(--blue2); color: var(--blue); border-color: var(--blue); }
    .tbl-count   { font-size: 11px; color: var(--muted); }

    .tbl-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: var(--s2); border-bottom: 1px solid var(--border);
      padding: 8px 12px; text-align: left;
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.7px;
      color: var(--muted); white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--border); transition: background .1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--s2); }
    td { padding: 8px 12px; font-size: 12px; white-space: nowrap; }

    .td-name  { font-weight: 600; color: var(--text); }
    .td-pos   { color: var(--green); }
    .td-neg   { color: var(--red); }
    .td-mkt   { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 3px; }
    .td-mkt.eur { background: var(--blue2);  color: var(--blue); }
    .td-mkt.usd { background: var(--green2); color: var(--green); }

    /* trust badges */
    .trust {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 2px 7px; border-radius: 3px; letter-spacing: 0.5px;
    }
    .trust-v { background: var(--green2); color: var(--green); }
    .trust-a { background: var(--yellow2); color: var(--yellow); }
    .trust-r { background: var(--red2);   color: var(--red); }

    .td-delta-pos { color: var(--green); }
    .td-delta-neg { color: var(--red); }
    .td-delta-nil { color: var(--dim); }
    .no-rows { padding: 24px; text-align: center; color: var(--muted); }

    /* ── FOOTER ──────────────────────────────────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 12px 20px;
      display: flex; justify-content: space-between;
      flex-wrap: wrap; gap: 8px;
      font-size: 11px; color: var(--muted);
    }
    .ft-totals { display: flex; gap: 20px; flex-wrap: wrap; }
    .ft-item span { font-weight: 600; }
  </style>
</head>
<body>

<div id="topbar">
  <div class="tb-left">
    <span class="tb-badge">eToro</span>
    <span class="tb-name">Carlos</span>
    <span class="tb-pair">EUR · USD</span>
  </div>
  <div id="utc-clock">UTC <b id="clock-val">--:--:--</b></div>
</div>

<nav id="date-tabs"></nav>

<main>

  <section>
    <div class="sec-label" id="kpi-sec-label">Performance</div>
    <div id="kpi-grid"></div>
  </section>

  <section>
    <div class="sec-label">Histórico P&L (sparkline 5 dias)</div>
    <div id="panels">
      <div class="panel">
        <div class="panel-head">
          <span class="panel-title">EUR Positions</span>
          <span class="panel-lucro" id="eur-lucro">—</span>
        </div>
        <div class="panel-meta" id="eur-meta"></div>
        <div class="spark-wrap"><canvas id="chart-eur"></canvas></div>
      </div>
      <div class="panel">
        <div class="panel-head">
          <span class="panel-title">USD Positions</span>
          <span class="panel-lucro" id="usd-lucro">—</span>
        </div>
        <div class="panel-meta" id="usd-meta"></div>
        <div class="spark-wrap"><canvas id="chart-usd"></canvas></div>
      </div>
    </div>
  </section>

  <section>
    <div id="eventos-panel">
      <div class="sec-label" style="margin-bottom:10px">Eventos do dia — <span id="ev-date-lbl"></span></div>
      <div class="ev-list" id="ev-list"></div>
    </div>
  </section>

  <section>
    <div id="table-wrap">
      <div class="tbl-head">
        <div class="ftabs">
          <button class="ftab active" data-f="both">Ambas</button>
          <button class="ftab"        data-f="eur">EUR</button>
          <button class="ftab"        data-f="usd">USD</button>
        </div>
        <span class="tbl-count" id="tbl-count"></span>
      </div>
      <div class="tbl-scroll">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Mkt</th>
              <th>Lucro %</th>
              <th>Lucro €/$</th>
              <th>Volume</th>
              <th>Valor</th>
              <th>Atual</th>
              <th>Abertura</th>
              <th>Trust</th>
              <th>Δ D-1 %</th>
              <th>Δ D-1 €/$</th>
            </tr>
          </thead>
          <tbody id="tbl-body"></tbody>
        </table>
      </div>
    </div>
  </section>

</main>

<footer>
  <div class="ft-totals" id="ft-totals"></div>
  <div id="ft-meta"></div>
</footer>

<script>
(function () {
  'use strict';

  /* ── guard ─────────────────────────────────────────────────────── */
  if (typeof TRADING_DATA === 'undefined') {
    document.body.innerHTML = '<div style="padding:40px;color:#f85149;font-family:monospace">Erro: data.js não encontrado. Corre <code>npm run pipeline</code>.</div>';
    return;
  }

  const D      = TRADING_DATA;
  const DATES  = (typeof DATA_DATES  !== 'undefined') ? DATA_DATES  : Object.keys(D).sort().slice(-7);
  const LATEST = (typeof LATEST_DATE !== 'undefined') ? LATEST_DATE : DATES[DATES.length - 1];

  let activeDate   = LATEST;
  let activeFilter = 'both';

  /* ── helpers ────────────────────────────────────────────────────── */
  const f2    = n => (n == null) ? '—' : Number(n).toFixed(2);
  const sign  = n => (n > 0 ? '+' : '') + f2(n);
  const cls   = n => n > 0 ? 'pos' : n < 0 ? 'neg' : '';
  const dayOf = d => D[d] || { eur: { lucro: 0, positions: [] }, usd: { lucro: 0, positions: [] }, eventos: [] };

  function labelDate(d) {
    if (!d) return '—';
    const months = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    const [, mm, dd] = d.split('-');
    return `${parseInt(dd)} ${months[parseInt(mm) - 1]}`;
  }

  /* ── UTC clock ──────────────────────────────────────────────────── */
  function tick() {
    const n  = new Date();
    const hh = String(n.getUTCHours()).padStart(2,'0');
    const mm = String(n.getUTCMinutes()).padStart(2,'0');
    const ss = String(n.getUTCSeconds()).padStart(2,'0');
    document.getElementById('clock-val').textContent = `${hh}:${mm}:${ss}`;
  }
  tick(); setInterval(tick, 1000);

  /* ── date tabs ──────────────────────────────────────────────────── */
  function buildTabs() {
    const nav = document.getElementById('date-tabs');
    nav.innerHTML = '';
    DATES.forEach(d => {
      const b = document.createElement('button');
      b.className    = 'dtab' + (d === activeDate ? ' active' : '');
      b.textContent  = labelDate(d);
      b.dataset.date = d;
      b.onclick = () => selectDate(d);
      nav.appendChild(b);
    });
  }

  function selectDate(d) {
    activeDate = d;
    document.querySelectorAll('.dtab').forEach(b => b.classList.toggle('active', b.dataset.date === d));
    renderKPIs(); renderPanelMeta(); renderEventos(); renderTable(); highlightSpark();
  }

  /* ── KPIs ───────────────────────────────────────────────────────── */
  function renderKPIs() {
    const day  = dayOf(activeDate);
    const eurL = day.eur?.lucro ?? 0;
    const usdL = day.usd?.lucro ?? 0;
    const tot  = Math.round((eurL + usdL) * 100) / 100;

    const prevDate = DATES[DATES.indexOf(activeDate) - 1];
    const prev     = prevDate ? dayOf(prevDate) : null;
    const dEur     = prev != null ? Math.round((eurL - (prev.eur?.lucro ?? 0)) * 100) / 100 : null;
    const dUsd     = prev != null ? Math.round((usdL - (prev.usd?.lucro ?? 0)) * 100) / 100 : null;

    const allPos = [...(day.eur?.positions ?? []), ...(day.usd?.positions ?? [])];
    const wins   = allPos.filter(p => (p.lucro ?? 0) > 0).length;
    const best   = allPos.length ? Math.max(...allPos.map(p => p.lucro ?? 0)) : null;
    const worst  = allPos.length ? Math.min(...allPos.map(p => p.lucro ?? 0)) : null;

    document.getElementById('kpi-sec-label').textContent = `Performance — ${labelDate(activeDate)}`;

    const kpis = [
      { label: 'Lucro EUR',         val: sign(eurL),                                  cl: cls(eurL),         sub: `${day.eur?.positions?.length ?? 0} posições` },
      { label: 'Lucro USD',         val: sign(usdL),                                  cl: cls(usdL),         sub: `${day.usd?.positions?.length ?? 0} posições` },
      { label: 'Total ~EUR',        val: sign(tot),                                   cl: cls(tot),          sub: `${allPos.length} posições` },
      { label: 'Δ EUR vs D-1',      val: dEur != null ? sign(dEur) : '—',             cl: dEur != null ? cls(dEur) : '', sub: prevDate ? labelDate(prevDate) : 'primeiro dia' },
      { label: 'Δ USD vs D-1',      val: dUsd != null ? sign(dUsd) : '—',             cl: dUsd != null ? cls(dUsd) : '', sub: prevDate ? labelDate(prevDate) : 'primeiro dia' },
      { label: '+Posições / Total', val: `${wins} / ${allPos.length}`,               cl: wins >= allPos.length / 2 ? 'pos' : 'neg', sub: '' },
      { label: 'Melhor Posição',    val: best  != null ? sign(best)  : '—',           cl: 'pos', sub: '' },
      { label: 'Pior Posição',      val: worst != null ? sign(worst) : '—',           cl: 'neg', sub: '' },
    ];

    const grid = document.getElementById('kpi-grid');
    grid.innerHTML = '';
    kpis.forEach(k => {
      grid.insertAdjacentHTML('beforeend',
        `<div class="kpi">
          <div class="kpi-label">${k.label}</div>
          <div class="kpi-val ${k.cl}">${k.val}</div>
          ${k.sub ? `<div class="kpi-sub">${k.sub}</div>` : ''}
        </div>`);
    });
  }

  /* ── panel meta ─────────────────────────────────────────────────── */
  function renderPanelMeta() {
    const day      = dayOf(activeDate);
    const prevDate = DATES[DATES.indexOf(activeDate) - 1];
    const prev     = prevDate ? dayOf(prevDate) : null;

    ['eur', 'usd'].forEach(side => {
      const s    = day[side] ?? { lucro: 0, positions: [] };
      const pos  = s.positions ?? [];
      const wins = pos.filter(p => (p.lucro ?? 0) > 0).length;
      const loss = pos.filter(p => (p.lucro ?? 0) < 0).length;
      const best = pos.length ? Math.max(...pos.map(p => p.lucro ?? 0)) : 0;
      const wrst = pos.length ? Math.min(...pos.map(p => p.lucro ?? 0)) : 0;
      const prevL = prev ? (prev[side]?.lucro ?? 0) : null;
      const dL    = prevL != null ? Math.round((s.lucro - prevL) * 100) / 100 : null;

      const lucroEl     = document.getElementById(`${side}-lucro`);
      lucroEl.textContent = sign(s.lucro);
      lucroEl.className   = 'panel-lucro ' + cls(s.lucro);

      let html = `
        <div class="pmeta">+P: <span class="pos">${wins}</span></div>
        <div class="pmeta">-P: <span class="neg">${loss}</span></div>
        <div class="pmeta">Melhor: <span class="pos">${sign(best)}</span></div>
        <div class="pmeta">Pior: <span class="neg">${sign(wrst)}</span></div>
        ${dL != null ? `<div class="pmeta">Δ D-1: <span class="${cls(dL)}">${sign(dL)}</span></div>` : ''}
      `;
      if (s.caixa  != null) html += `<span class="pmeta badge caixa">📦 Caixa: ${s.caixa}${side === 'eur' ? '€' : '$'}</span>`;
      if (s.aporte != null) html += `<span class="pmeta badge aporte">💰 Aporte: ${s.aporte}$</span>`;

      document.getElementById(`${side}-meta`).innerHTML = html;
    });
  }

  /* ── sparklines ──────────────────────────────────────────────────── */
  let chartEur = null, chartUsd = null;

  function buildSparks() {
    Chart.defaults.color       = '#6e7f96';
    Chart.defaults.font.family = "'IBM Plex Mono', monospace";
    Chart.defaults.font.size   = 10;

    const allDates = Object.keys(D).sort();
    const labels   = allDates.map(d => labelDate(d));
    const eurData  = allDates.map(d => D[d]?.eur?.lucro ?? 0);
    const usdData  = allDates.map(d => D[d]?.usd?.lucro ?? 0);

    function cfg(data, color, bg) {
      return {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data, borderColor: color, backgroundColor: bg,
            borderWidth: 1.5, fill: true, tension: 0.35,
            pointRadius: allDates.map(() => 3),
            pointBackgroundColor: allDates.map(() => color),
            pointBorderWidth: 0,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false, animation: false,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: c => ' ' + sign(c.parsed.y) } }
          },
          scales: {
            x: { display: false },
            y: { display: true, grid: { color: '#1c2636' }, ticks: { callback: v => sign(v), maxTicksLimit: 3 } }
          }
        }
      };
    }

    if (chartEur) chartEur.destroy();
    if (chartUsd) chartUsd.destroy();
    chartEur = new Chart(document.getElementById('chart-eur'), cfg(eurData, '#58a6ff', 'rgba(88,166,255,0.07)'));
    chartUsd = new Chart(document.getElementById('chart-usd'), cfg(usdData, '#3fb950', 'rgba(63,185,80,0.07)'));
    highlightSpark();
  }

  function highlightSpark() {
    const allDates = Object.keys(D).sort();
    [{ c: chartEur, col: '#58a6ff' }, { c: chartUsd, col: '#3fb950' }].forEach(({ c, col }) => {
      if (!c) return;
      c.data.datasets[0].pointBackgroundColor = allDates.map(d => d === activeDate ? '#ffffff' : col);
      c.data.datasets[0].pointRadius          = allDates.map(d => d === activeDate ? 5 : 3);
      c.update('none');
    });
  }

  /* ── eventos ─────────────────────────────────────────────────────── */
  const EV_ICON = { saida: '🔴', entrada: '🟢', aporte: '💰', caixa: '📦' };

  function renderEventos() {
    const day  = dayOf(activeDate);
    const evs  = day.eventos ?? [];
    document.getElementById('ev-date-lbl').textContent = labelDate(activeDate);
    const list = document.getElementById('ev-list');
    list.innerHTML = '';
    if (!evs.length) {
      list.innerHTML = '<div class="no-ev">Sem eventos registados para este dia.</div>';
      return;
    }
    evs.forEach(e => {
      const mkt  = (e.mkt || '').toLowerCase();
      const icon = EV_ICON[e.tipo] ?? '●';
      list.insertAdjacentHTML('beforeend',
        `<div class="ev-row">
          <span class="ev-icon">${icon}</span>
          ${mkt ? `<span class="ev-mkt ${mkt}">${e.mkt}</span>` : ''}
          <span class="ev-nota">${e.nota || ''}</span>
        </div>`);
    });
  }

  /* ── table ───────────────────────────────────────────────────────── */
  const TRUST_MAP = {
    v: ['trust-v', 'Verde'],
    a: ['trust-a', 'Neutro'],
    r: ['trust-r', 'Alerta'],
  };

  function renderTable() {
    const day     = dayOf(activeDate);
    const eurRows = (day.eur?.positions ?? []).map(p => ({ ...p, _side: 'eur' }));
    const usdRows = (day.usd?.positions ?? []).map(p => ({ ...p, _side: 'usd' }));

    const rows = activeFilter === 'eur'  ? eurRows
               : activeFilter === 'usd'  ? usdRows
               : [...eurRows, ...usdRows];

    document.getElementById('tbl-count').textContent = `${rows.length} posições`;

    const tbody = document.getElementById('tbl-body');
    tbody.innerHTML = '';

    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="11" class="no-rows">Sem posições para este filtro.</td></tr>`;
      return;
    }

    rows.forEach(p => {
      const pct             = p.pct   ?? 0;
      const lucro           = p.lucro ?? 0;
      const [tCls, tLbl]    = TRUST_MAP[p.trust] ?? ['trust-a', '—'];
      const dPct            = p.delta?.pct ?? null;
      const dVal            = p.delta?.val ?? null;
      const clsDPct         = dPct == null ? 'td-delta-nil' : dPct > 0 ? 'td-delta-pos' : dPct < 0 ? 'td-delta-neg' : 'td-delta-nil';
      const clsDVal         = dVal == null ? 'td-delta-nil' : dVal > 0 ? 'td-delta-pos' : dVal < 0 ? 'td-delta-neg' : 'td-delta-nil';

      tbody.insertAdjacentHTML('beforeend',
        `<tr>
          <td class="td-name">${p.name ?? '—'}</td>
          <td><span class="td-mkt ${p._side}">${(p.mkt ?? p._side).toUpperCase()}</span></td>
          <td class="${pct   > 0 ? 'td-pos' : pct   < 0 ? 'td-neg' : ''}">${sign(pct)}%</td>
          <td class="${lucro > 0 ? 'td-pos' : lucro < 0 ? 'td-neg' : ''}">${sign(lucro)}</td>
          <td style="color:var(--muted)">${p.vol  ?? '—'}</td>
          <td style="color:var(--muted)">${f2(p.valor ?? null)}</td>
          <td>${p.atual    ?? '—'}</td>
          <td>${p.abertura ?? '—'}</td>
          <td><span class="trust ${tCls}">${tLbl}</span></td>
          <td class="${clsDPct}">${dPct != null ? sign(dPct) + '%' : '—'}</td>
          <td class="${clsDVal}">${dVal != null ? sign(dVal)       : '—'}</td>
        </tr>`);
    });
  }

  /* ── filter tabs ─────────────────────────────────────────────────── */
  document.querySelectorAll('.ftab').forEach(btn => {
    btn.addEventListener('click', () => {
      activeFilter = btn.dataset.f;
      document.querySelectorAll('.ftab').forEach(b => b.classList.toggle('active', b === btn));
      renderTable();
    });
  });

  /* ── footer ──────────────────────────────────────────────────────── */
  function buildFooter() {
    const days = Object.values(D);
    const tEur = days.reduce((s, d) => s + (d.eur?.lucro ?? 0), 0);
    const tUsd = days.reduce((s, d) => s + (d.usd?.lucro ?? 0), 0);
    const tAll = tEur + tUsd;
    const nPos = days.reduce((s, d) => s + (d.eur?.positions?.length ?? 0) + (d.usd?.positions?.length ?? 0), 0);

    document.getElementById('ft-totals').innerHTML = `
      <span class="ft-item">EUR acum.: <span class="${cls(tEur)}">${sign(Math.round(tEur*100)/100)}</span></span>
      <span class="ft-item">USD acum.: <span class="${cls(tUsd)}">${sign(Math.round(tUsd*100)/100)}</span></span>
      <span class="ft-item">Consolidado: <span class="${cls(tAll)}">${sign(Math.round(tAll*100)/100)}</span></span>
      <span class="ft-item" style="color:var(--dim)">${days.length} dias · ${nPos} posições totais</span>
    `;

    const lastDate = Object.keys(D).sort().pop() ?? '—';
    document.getElementById('ft-meta').textContent = `Carlos · eToro · ${lastDate}`;
  }

  /* ── init ────────────────────────────────────────────────────────── */
  buildTabs();
  renderKPIs();
  renderPanelMeta();
  buildSparks();
  renderEventos();
  renderTable();
  buildFooter();

})();
</script>
</body>
</html>
